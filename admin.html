<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Навигатор профилей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-wrap {
      width: min(1100px, calc(100% - 40px));
      margin: 40px auto 60px;
    }

    .admin-login,
    .admin-panel {
      background: #fff;
      border: 1px solid #e3def0;
      border-radius: 28px;
      box-shadow: 0 16px 40px rgba(49, 35, 100, 0.10);
      padding: 28px;
    }

    .admin-login {
      max-width: 480px;
      margin: 40px auto 0;
    }

    .admin-title {
      margin: 0 0 10px;
      font-size: 36px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #202538;
    }

    .admin-text {
      margin: 0 0 18px;
      color: #666d82;
      line-height: 1.6;
    }

    .admin-field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .admin-field label {
      font-size: 14px;
      font-weight: 700;
      color: #202538;
    }

    .admin-field input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #d8d1eb;
      font: inherit;
      outline: none;
    }

    .admin-field input:focus {
      border-color: #6b4ce6;
      box-shadow: 0 0 0 4px rgba(107, 76, 230, 0.12);
    }

    .admin-error,
    .admin-status {
      min-height: 22px;
      margin: 10px 0 0;
      font-size: 14px;
      font-weight: 600;
    }

    .admin-error {
      color: #cf2f52;
    }

    .admin-status {
      color: #5a3dd7;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .admin-count {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: #f1ecfb;
      color: #5a3dd7;
      font-size: 14px;
      font-weight: 700;
    }

    .records-list {
      display: grid;
      gap: 16px;
    }

    .record-card {
      border: 1px solid #e3def0;
      border-radius: 22px;
      padding: 20px;
      background: #faf8ff;
    }

    .record-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .record-name {
      margin: 0;
      font-size: 22px;
      color: #202538;
    }

    .record-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 8px 0 0;
    }

    .record-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #efeaff;
      color: #5a3dd7;
      font-size: 13px;
      font-weight: 700;
    }

    .record-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .record-row strong {
      display: block;
      margin-bottom: 4px;
      color: #202538;
      font-size: 14px;
    }

    .record-row span,
    .record-row code {
      color: #666d82;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .record-row code {
      display: block;
      background: #fff;
      border: 1px solid #e3def0;
      border-radius: 14px;
      padding: 12px;
      font-family: monospace;
      font-size: 13px;
    }

    .record-actions {
      display: flex;
      justify-content: flex-end;
    }

    .danger-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: none;
      background: #cf2f52;
      color: #fff;
      padding: 12px 20px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .danger-btn:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .empty-box {
      padding: 30px;
      border-radius: 22px;
      border: 1px dashed #d8d1eb;
      background: #faf8ff;
      color: #666d82;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="Навигатор профилей">
        <img src="assets/logoprof2.png" alt="Логотип проекта" class="brand-logo">
        <span class="brand-text">Навигатор профилей — админка</span>
      </a>
    </div>
  </header>

  <main class="admin-wrap">
    <section class="admin-login" id="adminLoginBox">
      <h1 class="admin-title">Вход в админку</h1>
      <p class="admin-text">Введите пароль администратора, чтобы просматривать и удалять экспертные записи.</p>

      <div class="admin-field">
        <label for="adminPassword">Пароль</label>
        <input id="adminPassword" type="password" placeholder="Введите пароль">
      </div>

      <button class="primary-btn" id="adminLoginBtn" type="button">Войти</button>
      <p class="admin-error" id="adminError"></p>
    </section>

    <section class="admin-panel hidden" id="adminPanel">
      <div class="admin-topbar">
        <div>
          <h2 class="admin-title" style="font-size:32px; margin-bottom:8px;">Экспертные записи</h2>
          <p class="admin-text" style="margin:0;">Здесь можно удалять неподходящие ответы из базы.</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <span class="admin-count" id="recordsCount">Записей: 0</span>
          <button class="secondary-btn" id="reloadRecordsBtn" type="button">Обновить</button>
        </div>
      </div>

      <p class="admin-status" id="adminStatus"></p>

      <div class="records-list" id="recordsList"></div>
      <div class="empty-box hidden" id="emptyBox">Записей пока нет.</div>
    </section>
  </main>

  <script src="admin.js?v=12"></script>
</body>
</html>
